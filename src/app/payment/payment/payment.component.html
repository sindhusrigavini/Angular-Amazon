<h2>Select Payment Method</h2>

<label>
  <input type="radio" [(ngModel)]="paymentType" value="UPI">
  UPI
</label>
<br>

<label>
  <input type="radio" [(ngModel)]="paymentType" value="CARD">
  Debit / Credit Card
</label>
<br>

<label>
  <input type="radio" [(ngModel)]="paymentType" value="COD">
  Cash On Delivery
</label>

<br><br>

<button (click)="placeOrder()">
Pay Now
</button>
